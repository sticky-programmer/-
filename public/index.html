<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Service</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section id="loginView" class="auth-panel" hidden>
        <form id="loginForm" class="login-form">
          <div>
            <h1>Image Service</h1>
            <p>Sign in to upload and manage server images.</p>
          </div>
          <label>
            Username
            <input id="usernameInput" name="username" type="text" autocomplete="username" required>
          </label>
          <label>
            Password
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
        </form>
      </section>

      <section id="appView" hidden>
        <header class="toolbar">
          <div>
            <h1>Image Manager</h1>
            <p id="userText">Signed in</p>
          </div>
          <div class="toolbar-actions">
            <button id="refreshButton" type="button" class="secondary">Refresh</button>
            <button id="logoutButton" type="button" class="secondary">Sign out</button>
          </div>
        </header>

        <section class="upload-band" aria-label="Image upload">
          <form id="uploadForm" class="upload-form">
            <label class="file-picker">
              <input id="imageInput" name="image" type="file" accept="image/*" required>
              <span>Choose image</span>
            </label>
            <span id="fileNameText" class="file-name">No file selected</span>
            <button type="submit">Upload image</button>
          </form>
        </section>

        <section class="settings-band" aria-label="API key settings">
          <div>
            <h2>Header API Key</h2>
            <p id="apiKeyStatus">Loading API key status...</p>
          </div>
          <form id="apiKeyForm" class="api-key-form">
            <input id="apiKeyInput" name="key" type="password" autocomplete="new-password" minlength="12" placeholder="New API key, at least 12 characters" required>
            <button type="submit">Save key</button>
          </form>
        </section>

        <section class="settings-band" aria-label="CORS settings">
          <div>
            <h2>CORS Origins</h2>
            <p id="corsStatus">Loading CORS settings...</p>
          </div>
          <form id="corsForm" class="cors-form">
            <textarea id="corsInput" name="origins" rows="3" placeholder="One origin per line, for example:&#10;http://8.137.192.209:5173&#10;http://your-frontend.com"></textarea>
            <button type="submit">Save origins</button>
          </form>
        </section>

        <section class="list-tools" aria-label="Image search">
          <input id="searchInput" type="search" placeholder="Search by filename or ID">
          <span id="statusText" aria-live="polite">Loading images...</span>
        </section>

        <section id="gallery" class="gallery" aria-label="Image list"></section>
      </section>
    </main>

    <dialog id="detailDialog">
      <div class="detail-panel">
        <img id="detailImage" alt="">
        <dl>
          <div>
            <dt>ID</dt>
            <dd id="detailId"></dd>
          </div>
          <div>
            <dt>Original file</dt>
            <dd id="detailName"></dd>
          </div>
          <div>
            <dt>Dimensions</dt>
            <dd id="detailSize"></dd>
          </div>
          <div>
            <dt>Compression</dt>
            <dd id="detailCompress"></dd>
          </div>
          <div>
            <dt>URL</dt>
            <dd><a id="detailUrl" target="_blank" rel="noreferrer"></a></dd>
          </div>
        </dl>
        <div class="dialog-actions">
          <button id="closeDetail" type="button" class="secondary">Close</button>
        </div>
      </div>
    </dialog>

    <template id="imageCardTemplate">
      <article class="image-card">
        <a class="image-link" target="_blank" rel="noreferrer">
          <img alt="">
        </a>
        <div class="image-info">
          <h2></h2>
          <p></p>
        </div>
        <div class="card-actions">
          <button type="button" data-action="detail">Details</button>
          <button type="button" data-action="copy">Copy URL</button>
          <button type="button" data-action="delete" class="danger">Delete</button>
        </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
